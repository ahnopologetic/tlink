name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install system deps (tmux for integration tests)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tmux python3

      - name: fmt
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy -- -D warnings

      - name: Start tmux session for integration tests
        run: |
          tmux new-session -d -s ci-test 2>/dev/null || true
          tmux rename-window -t ci-test:0 test-window 2>/dev/null || true

      # Build the main binary and copy it to a safe location.
      # Copying avoids test-harness transformation when cargo test re-links it.
      - name: Build and copy binary
        run: |
          cargo build --bin tlink
          cp target/debug/tlink /tmp/tlink-bin
          chmod +x /tmp/tlink-bin
          /tmp/tlink-bin --version

      # Run all tests — integration tests use TLINK_BIN env var to find the
      # pre-built binary copy, avoiding cargo lock conflicts.
      - name: Run tests
        run: |
          export TLINK_BIN=/tmp/tlink-bin
          cargo test -- --test-threads=4

      - name: Clean up tmux
        if: always()
        run: tmux kill-session -t ci-test 2>/dev/null || true
