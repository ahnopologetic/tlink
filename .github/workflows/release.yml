name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest   # arm64 runner (macos-14+)
            target: aarch64-apple-darwin
          - os: macos-13       # x86_64 runner
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact
        run: |
          cp target/${{ matrix.target }}/release/tlink tlink-${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: tlink-${{ matrix.target }}
          path: tlink-${{ matrix.target }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Checksums
        run: |
          cd artifacts
          sha256sum tlink-* > checksums.txt
          cat checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/tlink-aarch64-apple-darwin
            artifacts/tlink-x86_64-apple-darwin
            artifacts/checksums.txt
          generate_release_notes: true
