#:schema https://www.schemastore.org/prek.json

[[repos]]
repo = "local"
hooks = [
    { id = "cargo-fmt", name = "cargo fmt", language = "system", entry = "cargo fmt --check", types = ["rust"], pass_filenames = false },
    { id = "cargo-clippy", name = "cargo clippy", language = "system", entry = "cargo clippy -- -D warnings", types = ["rust"], pass_filenames = false },
    { id = "cargo-test", name = "cargo test", language = "system", entry = "cargo test", types = ["rust"], pass_filenames = false },
]
